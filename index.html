<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photography Location Finder</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <section class="hero">
        <p class="hero-eyebrow">Mumbai & Navi Mumbai</p>
        <h1 class="hero-title">Find your next<br><span>perfect shot.</span></h1>
        <p class="hero-subtitle">Discover photography locations curated for every style — from golden hour landscapes to gritty street scenes.</p>
    </section>

    <section class="search-section">
        <div class="search-strip">
            <select class="style-select" id="styleSelect">
                <option>Street Photography</option>
                <option>Landscape Photography</option>
                <option>Portrait Photography</option>
                <option>Architecture Photography</option>
                <option value="">All Styles</option>
            </select>
            <div class="search-divider"></div>
            <input
                class="search-input"
                type="text"
                id="searchInput"
                placeholder="City, time of day, vibe..."
            >
            <button class="clear-btn" onclick="clearSearch()">Clear</button>
            <button class="search-btn" onclick="showSelection()">Find Locations</button>
        </div>
    </section>

    <section class="results-section">
        <div id="results"></div>
    </section>

    <script src="script.js"></script>

</body>
</html>
