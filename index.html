<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photography Location Finder</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <section class="hero">
        <p class="hero-eyebrow">Mumbai & Navi Mumbai — Photography Guide</p>
        <h1 class="hero-title">Every frame starts<br>with a <em>place.</em></h1>
        <p class="hero-subtitle">Curated locations for photographers — sorted by style, light, and feel.</p>
    </section>

    <section class="search-section">

        <!-- Mode toggle -->
        <div class="mode-toggle">
            <button class="mode-btn active" id="filterModeBtn" onclick="switchMode('filter')">Filter Search</button>
            <button class="mode-btn" id="aiModeBtn" onclick="switchMode('ai')">AI Search</button>
        </div>

        <!-- Filter mode -->
        <div class="search-strip" id="filterStrip">
            <select class="style-select" id="styleSelect">
                <option value="">All Styles</option>
                <option>Street Photography</option>
                <option>Landscape Photography</option>
                <option>Portrait Photography</option>
                <option>Architecture Photography</option>
            </select>
            <div class="search-divider"></div>
            <input
                class="search-input"
                type="text"
                id="searchInput"
                placeholder="Search by city, time, or vibe..."
            >
            <button class="clear-btn" onclick="clearSearch()">Clear</button>
            <button class="search-btn" onclick="showSelection()">Search</button>
        </div>

        <!-- AI mode -->
        <div class="search-strip ai-strip hidden" id="aiStrip">
            <input
                class="search-input"
                type="text"
                id="aiSearchInput"
                placeholder="Describe your ideal shoot — quiet sunrise near water, golden hour portraits..."
            >
            <button class="clear-btn" onclick="clearSearch()">Clear</button>
            <button class="search-btn" onclick="runAISearch()">Ask AI</button>
        </div>

    </section>

    <section class="results-section">
        <div id="results"></div>
    </section>

    <script src="script.js"></script>

</body>
</html>
