<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photography Location Finder</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Auth Modal -->
    <div class="auth-modal hidden" id="authModal">
        <div class="auth-box">
            <button class="auth-close" onclick="closeAuth()">✕</button>
            <h2 class="auth-title">Join the community</h2>
            <p class="auth-subtitle">Save your favourite locations.</p>
            <input class="auth-input" type="email" id="authEmail" placeholder="Email">
            <input class="auth-input" type="password" id="authPassword" placeholder="Password">
            <button class="auth-btn" onclick="signUp()">Sign Up</button>
            <button class="auth-btn secondary" onclick="signIn()">Sign In</button>
            <p class="auth-message" id="authMessage"></p>
        </div>
    </div>

    <section class="hero">
        <p class="hero-eyebrow">Mumbai, Navi Mumbai, Thane, Pune, Delhi, Bangalore, Chennai, Kerala — Photography Guide</p>
        <h1 class="hero-title">Every frame starts<br>with a <em>place.</em></h1>
        <p class="hero-subtitle">Curated locations for photographers — sorted by style, light, and feel.</p>
        <div class="hero-actions">
            <button class="hero-auth-btn" onclick="openAuth()" id="heroAuthBtn">Sign In</button>
            <button class="hero-auth-btn hidden" id="savedBtn" onclick="showSavedLocations()">My Locations</button>
        </div>
    </section>

    <section class="search-section">
        <div class="search-strip" id="filterStrip">
            <select class="style-select" id="styleSelect">
                <option value="">All Styles</option>
                <option>Street Photography</option>
                <option>Landscape Photography</option>
                <option>Portrait Photography</option>
                <option>Architecture Photography</option>
            </select>
            <div class="search-divider"></div>
            <input
                class="search-input"
                type="text"
                id="searchInput"
                placeholder="Mumbai, Navi Mumbai, Thane, Pune, Delhi, Bangalore, Chennai, Kerala..."
            >
            <button class="clear-btn" onclick="clearSearch()">Clear</button>
            <button class="search-btn" onclick="showSelection()">Search</button>
        </div>
    </section>

    <section class="results-section">
        <div id="results"></div>
    </section>

    <script src="script.js"></script>

</body>
</html>
